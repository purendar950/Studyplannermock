<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0b1020" />
  <title>Create account | Study Planner Mock</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="container inner">
      <a href="index.html" class="brand">
        <span class="logo">S</span>
        <span>STUDY PLANNER MOCK<small>SMART MOCK TESTS</small></span>
      </a>
      <nav class="nav"><a href="index.html">Home</a></nav>
    </div>
  </header>

  <main class="auth-wrap">
    <div class="auth-card">
      <h1>Create your account</h1>
      <p class="sub">Free forever. Start practising in seconds.</p>

      <div class="alert" id="alert"></div>

      <form id="signupForm">
        <div class="field">
          <label for="name">Full name</label>
          <input class="input" type="text" id="name" required placeholder="Your name" />
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input class="input" type="email" id="email" required autocomplete="email" placeholder="you@example.com" />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input class="input" type="password" id="password" required minlength="6" autocomplete="new-password" placeholder="At least 6 characters" />
        </div>
        <button class="btn block" type="submit" id="submitBtn">Create account</button>
      </form>

      <p class="auth-foot">Already have an account? <a href="login.html">Sign in</a></p>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/supabaseClient.js"></script>
  <script src="assets/js/auth.js"></script>
  <script>
    (function () {
      const alertEl = document.getElementById("alert");
      function show(cls, msg) { alertEl.className = "alert " + cls + " show"; alertEl.textContent = msg; }

      if (!window.MMH_CONFIGURED) {
        show("info", "Demo mode: add your Supabase keys in assets/js/config.js to enable real sign-up.");
      }

      document.getElementById("signupForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const btn = document.getElementById("submitBtn");
        btn.disabled = true; btn.textContent = "Creating…";
        try {
          const res = await window.MMH_AUTH.signUp(
            document.getElementById("email").value.trim(),
            document.getElementById("password").value,
            document.getElementById("name").value.trim()
          );
          if (res.session) {
            location.href = "index.html";
          } else {
            show("ok", "Account created! Check your email to confirm, then sign in.");
            btn.textContent = "Account created";
          }
        } catch (err) {
          show("error", err.message || "Sign up failed.");
          btn.disabled = false; btn.textContent = "Create account";
        }
      });
    })();
  </script>
</body>
</html>
