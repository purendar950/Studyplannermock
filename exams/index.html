<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Exams | MOCK MATRIX HUB</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary:#2563eb; --secondary:#1e40af; --bg-light:#f8fafc; --white:#fff; --border:#e2e8f0; --text-grey:#64748b; }
        body.dark-mode { --bg-light:#020617; --white:#1e293b; --border:#334155; --text-grey:#94a3b8; color:#f8fafc; }
        body { margin:0; font-family:'Inter',sans-serif; background:var(--bg-light); }
        .app-header { background:var(--white); padding:14px 18px; display:flex; align-items:center; gap:14px; position:sticky; top:0; z-index:100; box-shadow:0 2px 8px rgba(0,0,0,0.06); border-bottom:1px solid var(--border); }
        .app-header a { color:inherit; }
        .app-header h5 { margin:0; font-weight:800; }
        .wrap { max-width:760px; margin:0 auto; padding:18px; }
        .exam-card { background:var(--white); border:1px solid var(--border); border-radius:16px; padding:18px 20px; display:flex; align-items:center; justify-content:space-between; text-decoration:none; color:inherit; margin-bottom:14px; box-shadow:0 2px 8px rgba(0,0,0,0.04); transition:.2s; }
        .exam-card:hover { border-color:var(--primary); transform:translateY(-2px); }
        .ec-left { display:flex; align-items:center; gap:16px; }
        .ec-thumb { width:56px; height:56px; border-radius:14px; background:linear-gradient(135deg,var(--secondary),var(--primary)); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:800; font-family:'Poppins',sans-serif; }
        .ec-left h4 { margin:0; font-weight:800; font-size:1rem; }
        .ec-left p { margin:3px 0 0; font-size:.8rem; color:var(--text-grey); }
        .soon { font-size:.65rem; background:#fef3c7; color:#92400e; padding:2px 8px; border-radius:20px; font-weight:800; }
    </style>
</head>
<body>
    <header class="app-header">
        <a href="../"><i class="fas fa-arrow-left fs-5"></i></a>
        <h5>All Exams</h5>
    </header>
    <div class="wrap">
        <a href="cgl/" class="exam-card">
            <div class="ec-left">
                <div class="ec-thumb">CGL</div>
                <div><h4>SSC CGL</h4><p>Tier I &amp; Tier II &middot; PYQ + New Mocks</p></div>
            </div>
            <i class="fas fa-chevron-right text-muted"></i>
        </a>
        <a href="#" onclick="alert('SSC CHSL mocks coming soon!');return false;" class="exam-card">
            <div class="ec-left">
                <div class="ec-thumb">CHSL</div>
                <div><h4>SSC CHSL <span class="soon">SOON</span></h4><p>Tier I Mocks</p></div>
            </div>
            <i class="fas fa-chevron-right text-muted"></i>
        </a>
        <a href="#" onclick="alert('SSC MTS mocks coming soon!');return false;" class="exam-card">
            <div class="ec-left">
                <div class="ec-thumb">MTS</div>
                <div><h4>SSC MTS <span class="soon">SOON</span></h4><p>Paper I Mocks</p></div>
            </div>
            <i class="fas fa-chevron-right text-muted"></i>
        </a>
    </div>
    <script>if (localStorage.getItem('mmh_theme') === 'dark') document.body.classList.add('dark-mode');</script>
</body>
</html>
