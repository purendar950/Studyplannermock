<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test | MOCK MATRIX HUB</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{ --primary:#2563eb; --green:#16a34a; --red:#ef4444; --orange:#f59e0b; --purple:#7c3aed; --border:#e2e8f0; --grey:#64748b; --bg:#f1f5f9; }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:'Inter',sans-serif; background:var(--bg); color:#0f172a; }
  .hidden{ display:none !important; }

  /* Top bar */
  .exam-top{ background:#fff; border-bottom:2px solid var(--primary); display:flex; align-items:center; justify-content:space-between; padding:10px 16px; position:sticky; top:0; z-index:50; }
  .exam-top .name{ font-weight:800; font-size:0.95rem; }
  .exam-top .timer{ display:flex; align-items:center; gap:8px; font-weight:800; color:var(--primary); background:#eff6ff; padding:6px 12px; border-radius:8px; }
  .exam-top .timer.low{ color:var(--red); background:#fef2f2; }

  /* Section tabs */
  .section-tabs{ display:flex; gap:0; background:#fff; border-bottom:1px solid var(--border); overflow-x:auto; }
  .sec-tab{ white-space:nowrap; padding:10px 18px; font-weight:700; font-size:0.85rem; color:var(--grey); cursor:pointer; border:none; background:none; border-bottom:3px solid transparent; }
  .sec-tab.active{ color:var(--primary); border-bottom-color:var(--primary); background:#f8fafc; }

  /* Layout */
  .exam-body{ display:flex; gap:0; align-items:flex-start; }
  .q-panel{ flex:1; min-width:0; padding:18px 20px 90px; }
  .palette{ width:300px; flex-shrink:0; background:#fff; border-left:1px solid var(--border); min-height:calc(100vh - 96px); padding:14px; }

  .q-meta{ display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border); padding-bottom:10px; margin-bottom:14px; }
  .q-meta .qno{ font-weight:800; }
  .q-marks{ font-size:0.8rem; }
  .q-marks .pos{ color:var(--green); font-weight:800; } .q-marks .neg{ color:var(--red); font-weight:800; }
  .q-text{ font-size:1.02rem; line-height:1.6; font-weight:600; margin-bottom:18px; }
  .opt{ display:flex; align-items:center; gap:12px; padding:12px 14px; border:1px solid var(--border); border-radius:10px; margin-bottom:10px; cursor:pointer; background:#fff; transition:.15s; }
  .opt:hover{ border-color:var(--primary); }
  .opt.selected{ border-color:var(--primary); background:#eff6ff; }
  .opt .bullet{ width:26px; height:26px; border-radius:50%; border:2px solid var(--grey); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:0.8rem; flex-shrink:0; }
  .opt.selected .bullet{ border-color:var(--primary); background:var(--primary); color:#fff; }

  /* Action bar */
  .action-bar{ position:fixed; bottom:0; left:0; right:300px; background:#fff; border-top:1px solid var(--border); padding:12px 16px; display:flex; gap:10px; flex-wrap:wrap; z-index:40; }
  .btn{ border:none; border-radius:8px; padding:10px 16px; font-weight:700; font-size:0.85rem; cursor:pointer; }
  .btn-mark{ background:#ede9fe; color:var(--purple); }
  .btn-clear{ background:#f1f5f9; color:var(--grey); }
  .btn-save{ background:var(--green); color:#fff; }
  .btn-save-ghost{ background:#fff; color:var(--primary); border:1px solid var(--primary); }
  .btn-submit{ background:var(--primary); color:#fff; }
  .spacer{ flex:1; }

  /* Palette */
  .cand{ display:flex; align-items:center; gap:10px; padding-bottom:12px; border-bottom:1px solid var(--border); margin-bottom:12px; }
  .cand .av{ width:42px; height:42px; border-radius:50%; background:#eff6ff; color:var(--primary); display:flex; align-items:center; justify-content:center; font-size:1.2rem; }
  .legend{ display:grid; grid-template-columns:1fr 1fr; gap:6px 10px; font-size:0.72rem; margin-bottom:14px; }
  .legend span{ display:flex; align-items:center; gap:6px; }
  .lg-box{ width:20px; height:20px; border-radius:4px; display:inline-flex; align-items:center; justify-content:center; font-size:0.7rem; font-weight:700; color:#fff; }
  .lg-ans{ background:var(--green); } .lg-not{ background:var(--red); } .lg-nv{ background:#cbd5e1; color:#475569; }
  .lg-mark{ background:var(--purple); } .lg-markans{ background:var(--purple); position:relative; }

  .pal-title{ font-weight:800; font-size:0.8rem; margin:6px 0 10px; color:var(--grey); }
  .pal-grid{ display:grid; grid-template-columns:repeat(5,1fr); gap:8px; }
  .pal-btn{ aspect-ratio:1; border:none; border-radius:8px; font-weight:700; font-size:0.85rem; cursor:pointer; background:#cbd5e1; color:#475569; position:relative; }
  .pal-btn.answered{ background:var(--green); color:#fff; }
  .pal-btn.notans{ background:var(--red); color:#fff; }
  .pal-btn.marked{ background:var(--purple); color:#fff; }
  .pal-btn.markedans{ background:var(--purple); color:#fff; }
  .pal-btn.markedans::after{ content:''; position:absolute; bottom:3px; right:3px; width:8px; height:8px; border-radius:50%; background:var(--green); border:1px solid #fff; }
  .pal-btn.current{ outline:3px solid var(--primary); outline-offset:1px; }

  .mobile-pal-toggle{ display:none; }

  /* Result */
  #resultView{ max-width:900px; margin:0 auto; padding:20px 16px 60px; }
  .res-hero{ background:#fff; border-radius:16px; padding:24px; text-align:center; box-shadow:0 4px 14px rgba(0,0,0,0.05); margin-bottom:18px; }
  .res-score{ font-size:2.6rem; font-weight:800; color:var(--primary); }
  .res-stats{ display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:18px; }
  .stat{ background:#fff; border-radius:14px; padding:16px; text-align:center; box-shadow:0 2px 8px rgba(0,0,0,0.04); }
  .stat .v{ font-size:1.5rem; font-weight:800; } .stat .l{ font-size:0.72rem; color:var(--grey); font-weight:700; text-transform:uppercase; }
  .sec-table{ width:100%; border-collapse:collapse; background:#fff; border-radius:14px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,0.04); margin-bottom:20px; }
  .sec-table th,.sec-table td{ padding:11px 12px; text-align:center; font-size:0.85rem; border-bottom:1px solid var(--border); }
  .sec-table th{ background:#f8fafc; font-weight:800; }
  .sec-table td:first-child,.sec-table th:first-child{ text-align:left; }
  .rev-q{ background:#fff; border-radius:12px; padding:16px; margin-bottom:12px; box-shadow:0 2px 8px rgba(0,0,0,0.04); }
  .rev-q .rq-head{ display:flex; justify-content:space-between; font-size:0.75rem; font-weight:700; color:var(--grey); margin-bottom:8px; }
  .rev-opt{ padding:8px 12px; border-radius:8px; margin:5px 0; font-size:0.9rem; border:1px solid var(--border); }
  .rev-opt.correct{ background:#dcfce7; border-color:var(--green); }
  .rev-opt.wrong{ background:#fee2e2; border-color:var(--red); }
  .sol{ background:#f8fafc; border-left:3px solid var(--primary); padding:8px 12px; margin-top:8px; font-size:0.85rem; border-radius:6px; }
  .res-actions{ display:flex; gap:12px; justify-content:center; margin-bottom:20px; flex-wrap:wrap; }

  @media (max-width:900px){
    .palette{ position:fixed; top:0; right:-320px; height:100vh; z-index:60; transition:right .3s; overflow-y:auto; box-shadow:-4px 0 20px rgba(0,0,0,0.15); }
    .palette.show{ right:0; }
    .action-bar{ right:0; }
    .mobile-pal-toggle{ display:inline-flex; }
    .res-stats{ grid-template-columns:repeat(2,1fr); }
  }
</style>
</head>
<body>

<!-- ================= EXAM VIEW ================= -->
<div id="examView">
  <div class="exam-top">
    <div class="name" id="examName">Loading...</div>
    <div class="d-flex" style="display:flex; gap:10px; align-items:center;">
      <div class="timer" id="timer"><i class="fas fa-clock"></i> <span id="timeLeft">--:--</span></div>
      <button class="btn btn-mark mobile-pal-toggle" onclick="togglePalette()"><i class="fas fa-th"></i></button>
    </div>
  </div>
  <div class="section-tabs" id="sectionTabs"></div>
  <div class="exam-body">
    <div class="q-panel">
      <div class="q-meta">
        <div class="qno" id="qno">Question 1</div>
        <div class="q-marks"><span class="pos">+2.00</span> &nbsp; <span class="neg">-0.50</span></div>
      </div>
      <div class="q-text" id="qText"></div>
      <div id="optList"></div>
    </div>
    <div class="palette" id="palette">
      <div class="cand">
        <div class="av"><i class="fas fa-user"></i></div>
        <div><div style="font-weight:800;">Guest Aspirant</div><div style="font-size:0.72rem; color:var(--grey);" id="palSecName"></div></div>
      </div>
      <div class="legend">
        <span><i class="lg-box lg-ans"></i> Answered</span>
        <span><i class="lg-box lg-not"></i> Not Answered</span>
        <span><i class="lg-box lg-nv"></i> Not Visited</span>
        <span><i class="lg-box lg-mark"></i> Marked</span>
        <span><i class="lg-box lg-markans">&#10003;</i> Marked &amp; Answered</span>
      </div>
      <div class="pal-title">QUESTION PALETTE</div>
      <div class="pal-grid" id="palGrid"></div>
      <button class="btn btn-submit w-100" style="width:100%; margin-top:16px;" onclick="confirmSubmit()">SUBMIT TEST</button>
    </div>
  </div>
  <div class="action-bar">
    <button class="btn btn-mark" onclick="markAndNext()"><i class="fas fa-bookmark"></i> Mark &amp; Next</button>
    <button class="btn btn-clear" onclick="clearResponse()">Clear</button>
    <div class="spacer"></div>
    <button class="btn btn-save-ghost" onclick="prevQ()">Previous</button>
    <button class="btn btn-save" onclick="saveAndNext()">Save &amp; Next</button>
  </div>
</div>

<!-- ================= RESULT VIEW ================= -->
<div id="resultView" class="hidden"></div>

<script>
// ---------- Params ----------
const params = new URLSearchParams(location.search);
const QUIZ_ID = params.get('id') || 'CGL-DEMO';
const SECTION_PARAM = params.get('section') || '';
const MODE = params.get('mode') || '';
const USER = 'Guest';
const RESULT_KEY = `result_${USER}_${SECTION_PARAM ? QUIZ_ID + '-' + SECTION_PARAM.replace(/\s+/g,'').toLowerCase() : QUIZ_ID}`;

// ---------- Seeded RNG (deterministic per quiz) ----------
function seededRand(seedStr){
  let h = 2166136261;
  for(let i=0;i<seedStr.length;i++){ h ^= seedStr.charCodeAt(i); h = Math.imul(h, 16777619); }
  return function(){ h += 0x6D2B79F5; let t = h; t = Math.imul(t ^ (t>>>15), t|1); t ^= t + Math.imul(t ^ (t>>>7), t|61); return ((t ^ (t>>>14))>>>0)/4294967296; };
}
const rnd = seededRand(QUIZ_ID + SECTION_PARAM);
function ri(min,max){ return Math.floor(rnd()*(max-min+1))+min; }
function shuffleAns(correct, distractors){
  const opts = [correct, ...distractors];
  for(let i=opts.length-1;i>0;i--){ const j=Math.floor(rnd()*(i+1)); [opts[i],opts[j]]=[opts[j],opts[i]]; }
  return { options: opts, answer: opts.indexOf(correct) };
}

// ---------- Question banks ----------
const GK_BANK = [
  {q:"Who is known as the 'Father of the Indian Constitution'?", c:"Dr. B. R. Ambedkar", d:["Jawaharlal Nehru","Mahatma Gandhi","Sardar Patel"], s:"Dr. B. R. Ambedkar chaired the drafting committee of the Constitution."},
  {q:"The Tropic of Cancer does NOT pass through which of these Indian states?", c:"Bihar", d:["Gujarat","Rajasthan","Jharkhand"], s:"The Tropic of Cancer does not pass through Bihar."},
  {q:"Which gas is most abundant in the Earth's atmosphere?", c:"Nitrogen", d:["Oxygen","Carbon dioxide","Argon"], s:"Nitrogen makes up about 78% of the atmosphere."},
  {q:"The 'Dandi March' was associated with which movement?", c:"Civil Disobedience Movement", d:["Quit India Movement","Non-Cooperation Movement","Swadeshi Movement"], s:"The Dandi March (1930) launched the Civil Disobedience Movement."},
  {q:"Which is the largest gland in the human body?", c:"Liver", d:["Pancreas","Thyroid","Salivary gland"], s:"The liver is the largest gland in the human body."},
  {q:"RBI was nationalised in which year?", c:"1949", d:["1935","1947","1969"], s:"The Reserve Bank of India was nationalised in 1949."},
  {q:"The Ajanta caves are located in which state?", c:"Maharashtra", d:["Madhya Pradesh","Karnataka","Odisha"], s:"The Ajanta caves are in Maharashtra."},
  {q:"Which Article of the Constitution deals with the Right to Equality?", c:"Article 14", d:["Article 19","Article 21","Article 32"], s:"Article 14 guarantees equality before law."},
  {q:"The chemical symbol 'Na' stands for?", c:"Sodium", d:["Nitrogen","Nickel","Neon"], s:"Na (Natrium) is the symbol for Sodium."},
  {q:"Who wrote the national song 'Vande Mataram'?", c:"Bankim Chandra Chatterjee", d:["Rabindranath Tagore","Sarojini Naidu","Subhash Chandra Bose"], s:"Vande Mataram was written by Bankim Chandra Chatterjee."},
  {q:"Which planet is known as the 'Red Planet'?", c:"Mars", d:["Jupiter","Venus","Mercury"], s:"Mars appears red due to iron oxide on its surface."},
  {q:"The headquarters of UNESCO is located in?", c:"Paris", d:["New York","Geneva","Vienna"], s:"UNESCO is headquartered in Paris, France."},
  {q:"Which vitamin is produced when skin is exposed to sunlight?", c:"Vitamin D", d:["Vitamin A","Vitamin C","Vitamin K"], s:"Sunlight helps the skin synthesise Vitamin D."},
  {q:"The first Battle of Panipat was fought in?", c:"1526", d:["1556","1761","1605"], s:"The first Battle of Panipat was fought in 1526."},
  {q:"Which river is known as the 'Sorrow of Bihar'?", c:"Kosi", d:["Ganga","Yamuna","Son"], s:"The Kosi river is called the Sorrow of Bihar due to flooding."}
];
const SYN = [
  {w:"ABUNDANT", c:"Plentiful", d:["Scarce","Empty","Rare"]},
  {w:"BENEVOLENT", c:"Kind", d:["Cruel","Selfish","Hostile"]},
  {w:"CANDID", c:"Frank", d:["Secretive","Dishonest","Shy"]},
  {w:"DILIGENT", c:"Hardworking", d:["Lazy","Careless","Idle"]},
  {w:"ELOQUENT", c:"Articulate", d:["Silent","Dull","Clumsy"]},
  {w:"FRUGAL", c:"Thrifty", d:["Wasteful","Lavish","Generous"]},
  {w:"GREGARIOUS", c:"Sociable", d:["Shy","Aloof","Hostile"]},
  {w:"HAUGHTY", c:"Arrogant", d:["Humble","Modest","Timid"]}
];
const ANT = [
  {w:"OPTIMISTIC", c:"Pessimistic", d:["Hopeful","Cheerful","Positive"]},
  {w:"EXPAND", c:"Contract", d:["Enlarge","Grow","Stretch"]},
  {w:"ANCIENT", c:"Modern", d:["Old","Antique","Aged"]},
  {w:"VICTORY", c:"Defeat", d:["Triumph","Success","Win"]}
];

function makeMath(i){
  const t = i % 5;
  if(t===0){ const a=ri(120,480), b=ri(15,40), c=a/b|0; const ans=a+b; return {q:`What is ${a} + ${b}?`, c:ans, ds:[ans+ri(1,9), ans-ri(1,9), ans+ri(10,20)], s:`${a} + ${b} = ${ans}.`}; }
  if(t===1){ const a=ri(12,30), b=ri(6,15); const ans=a*b; return {q:`Find the product: ${a} × ${b}`, c:ans, ds:[ans+ri(2,12), ans-ri(2,12), ans+ri(13,25)], s:`${a} × ${b} = ${ans}.`}; }
  if(t===2){ const p=ri(2,8)*100, r=ri(4,12), ans=p*r/100; return {q:`Find ${r}% of ${p}.`, c:ans, ds:[ans+ri(2,10), ans-ri(2,10), ans+ri(11,30)], s:`${r}% of ${p} = ${ans}.`}; }
  if(t===3){ const b=ri(5,12), ans=b*b; return {q:`What is the square of ${b}?`, c:ans, ds:[ans+ri(1,8), ans-ri(1,8), (b+1)*(b+1)], s:`${b}² = ${ans}.`}; }
  const total=ri(200,600), q=ri(15,45), ans=Math.round(total*(100-q)/100); return {q:`A item costs ₹${total}. After a ${q}% discount, what is the price?`, c:ans, ds:[ans+ri(3,15), ans-ri(3,15), total-q], s:`Price = ${total} × (100-${q})/100 = ₹${ans}.`};
}
function makeReason(i){
  const t = i % 3;
  if(t===0){ const a=ri(2,9), dstep=ri(2,7); const seq=[a,a+dstep,a+2*dstep,a+3*dstep]; const ans=a+4*dstep; return {q:`Find the next term: ${seq.join(', ')}, ?`, c:ans, ds:[ans+dstep, ans-1, ans+2], s:`Common difference is ${dstep}, so next = ${ans}.`}; }
  if(t===1){ const a=ri(2,5); const seq=[a,a*2,a*4,a*8]; const ans=a*16; return {q:`Find the next term: ${seq.join(', ')}, ?`, c:ans, ds:[ans+a, a*12, ans-a], s:`Each term doubles, so next = ${ans}.`}; }
  const odd=ri(2,9); const sq=odd*odd; return {q:`Find the odd one out: ${sq}, ${odd*odd+1}, ${(odd+1)*(odd+1)}, ${(odd+2)*(odd+2)}`, c:String(odd*odd+1), ds:[String(sq), String((odd+1)*(odd+1)), String((odd+2)*(odd+2))], s:`${sq}, ${(odd+1)*(odd+1)} and ${(odd+2)*(odd+2)} are perfect squares; ${odd*odd+1} is not.`};
}

function buildQuestion(sectionKey, idxInSec, globalIdx){
  let qo;
  if(sectionKey==='MATHS' || sectionKey==='MATH'){ const m=makeMath(globalIdx); qo=shuffleAns(String(m.c), m.ds.map(String)); return {section:sectionKey, text:m.q, options:qo.options, answer:qo.answer, solution:m.s}; }
  if(sectionKey==='REASONING'){ const m=makeReason(globalIdx); qo=shuffleAns(String(m.c), m.ds.map(String)); return {section:sectionKey, text:m.q, options:qo.options, answer:qo.answer, solution:m.s}; }
  if(sectionKey==='GK'){ const m=GK_BANK[globalIdx % GK_BANK.length]; qo=shuffleAns(m.c, m.d); return {section:sectionKey, text:m.q, options:qo.options, answer:qo.answer, solution:m.s}; }
  if(sectionKey==='ENGLISH'){ const useSyn=(globalIdx%2===0); const m=useSyn?SYN[globalIdx%SYN.length]:ANT[globalIdx%ANT.length]; const lbl=useSyn?'SYNONYM':'ANTONYM'; qo=shuffleAns(m.c,m.d); return {section:sectionKey, text:`Choose the ${lbl} of: <b>${m.w}</b>`, options:qo.options, answer:qo.answer, solution:`The ${lbl.toLowerCase()} of ${m.w} is "${m.c}".`}; }
  // generic (tier2 sections etc.)
  const m=GK_BANK[globalIdx % GK_BANK.length]; qo=shuffleAns(m.c,m.d); return {section:sectionKey, text:m.q, options:qo.options, answer:qo.answer, solution:m.s};
}

// ---------- Test structure ----------
const SECTION_DEFS_T1 = [
  {key:'REASONING', name:'Reasoning', count:25},
  {key:'GK', name:'General Awareness', count:25},
  {key:'MATHS', name:'Quantitative Aptitude', count:25},
  {key:'ENGLISH', name:'English', count:25}
];
let SECTIONS = [];
let DURATION_MIN = 60;

function setupStructure(){
  if(SECTION_PARAM){
    // sectional test — single section
    const map = {'REASONING':{name:'Reasoning',count:25},'GK':{name:'General Awareness',count:25},'MATH':{name:'Quantitative Aptitude',count:25},'MATHS':{name:'Quantitative Aptitude',count:25},'ENGLISH':{name:'English',count:25}};
    const up = SECTION_PARAM.toUpperCase();
    const def = map[up] || {name:SECTION_PARAM, count:25};
    SECTIONS = [{key: up==='MATH'?'MATHS':up, name:def.name, count:def.count}];
    DURATION_MIN = 15;
  } else if(/SUB/i.test(QUIZ_ID)){
    SECTIONS = [{key: /GEO/i.test(QUIZ_ID)?'MATHS':'MATHS', name:'Subject Test', count:25}];
    DURATION_MIN = 20;
  } else {
    SECTIONS = SECTION_DEFS_T1.map(s=>({...s}));
    DURATION_MIN = 60;
  }
}

// ---------- Build all questions ----------
let QUESTIONS = [];
function buildAll(){
  QUESTIONS = [];
  let g = 0;
  SECTIONS.forEach((sec, si)=>{
    for(let i=0;i<sec.count;i++){
      const qq = buildQuestion(sec.key, i, g);
      qq.secIndex = si; qq.secName = sec.name;
      QUESTIONS.push(qq); g++;
    }
  });
}

// ---------- State ----------
// status: 0 not visited, 1 not answered(visited), 2 answered, 3 marked, 4 marked+answered
let state = [];
let current = 0;
let curSection = 0;
let remaining = 0;
let timerInt = null;

function initState(){
  state = QUESTIONS.map(()=>({ selected:null, status:0 }));
}

// ---------- Rendering ----------
function firstIndexOfSection(si){ return QUESTIONS.findIndex(q=>q.secIndex===si); }

function renderSectionTabs(){
  const tabs = document.getElementById('sectionTabs');
  tabs.innerHTML = SECTIONS.map((s,i)=>`<button class="sec-tab ${i===curSection?'active':''}" onclick="goSection(${i})">${s.name}</button>`).join('');
}

function goSection(si){
  curSection = si;
  current = firstIndexOfSection(si);
  renderSectionTabs();
  renderQuestion();
}

function renderQuestion(){
  const q = QUESTIONS[current];
  curSection = q.secIndex;
  renderSectionTabs();
  if(state[current].status===0) state[current].status = 1;
  document.getElementById('palSecName').innerText = q.secName;
  // local index within section
  const secStart = firstIndexOfSection(q.secIndex);
  document.getElementById('qno').innerText = `Question ${current - secStart + 1} of ${SECTIONS[q.secIndex].count}`;
  document.getElementById('qText').innerHTML = q.text;
  const letters = ['A','B','C','D'];
  document.getElementById('optList').innerHTML = q.options.map((o,i)=>`
    <div class="opt ${state[current].selected===i?'selected':''}" onclick="selectOpt(${i})">
      <span class="bullet">${letters[i]}</span><span>${o}</span>
    </div>`).join('');
  renderPalette();
}

function selectOpt(i){
  state[current].selected = i;
  // update status: keep marked flag
  if(state[current].status===3 || state[current].status===4) state[current].status = 4;
  else state[current].status = 2;
  renderQuestion();
}

function renderPalette(){
  const grid = document.getElementById('palGrid');
  const secStart = firstIndexOfSection(curSection);
  const count = SECTIONS[curSection].count;
  let html = '';
  for(let k=0;k<count;k++){
    const gi = secStart + k;
    const st = state[gi].status;
    let cls = st===2?'answered':st===1?'notans':st===3?'marked':st===4?'markedans':'';
    if(gi===current) cls += ' current';
    html += `<button class="pal-btn ${cls}" onclick="jump(${gi})">${k+1}</button>`;
  }
  grid.innerHTML = html;
}

function jump(gi){ current = gi; renderQuestion(); }

function saveAndNext(){
  // status already set on select; if no selection and was not visited mark not answered
  if(state[current].selected===null && (state[current].status===0 || state[current].status===1)) state[current].status = 1;
  goNext();
}
function markAndNext(){
  state[current].status = state[current].selected!==null ? 4 : 3;
  goNext();
}
function clearResponse(){
  state[current].selected = null;
  state[current].status = 1;
  renderQuestion();
}
function goNext(){
  if(current < QUESTIONS.length-1){ current++; renderQuestion(); }
  else renderQuestion();
}
function prevQ(){ if(current>0){ current--; renderQuestion(); } }

function togglePalette(){ document.getElementById('palette').classList.toggle('show'); }

// ---------- Timer ----------
function startTimer(){
  remaining = DURATION_MIN * 60;
  updateTimer();
  timerInt = setInterval(()=>{
    remaining--;
    updateTimer();
    if(remaining<=0){ clearInterval(timerInt); submitTest(true); }
  },1000);
}
function updateTimer(){
  const h = Math.floor(remaining/3600), m = Math.floor((remaining%3600)/60), s = remaining%60;
  const txt = (h>0? String(h).padStart(2,'0')+':':'') + String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  document.getElementById('timeLeft').innerText = txt;
  document.getElementById('timer').classList.toggle('low', remaining<=60);
}

// ---------- Submit ----------
function confirmSubmit(){
  const attempted = state.filter(s=>s.selected!==null).length;
  if(confirm(`You attempted ${attempted} of ${QUESTIONS.length} questions. Submit the test now?`)) submitTest(false);
}
function submitTest(auto){
  if(timerInt) clearInterval(timerInt);
  const POS = 2, NEG = 0.5;
  let correct=0, wrong=0, unatt=0, score=0;
  const secStats = SECTIONS.map(s=>({ name:s.name, total:s.count, correct:0, wrong:0, unatt:0, score:0 }));
  QUESTIONS.forEach((q,i)=>{
    const sel = state[i].selected;
    const ss = secStats[q.secIndex];
    if(sel===null){ unatt++; ss.unatt++; }
    else if(sel===q.answer){ correct++; score+=POS; ss.correct++; ss.score+=POS; }
    else { wrong++; score-=NEG; ss.wrong++; ss.score-=NEG; }
  });
  const total = QUESTIONS.length * POS;
  const accuracy = (correct+wrong)>0 ? Math.round(correct/(correct+wrong)*100) : 0;
  const result = {
    quizId: QUIZ_ID, section: SECTION_PARAM, ts: Date.now(),
    score: +score.toFixed(2), total, correct, wrong, unatt, accuracy,
    secStats, answers: state.map(s=>s.selected)
  };
  try{ localStorage.setItem(RESULT_KEY, JSON.stringify(result)); }catch(e){}
  showResult(result);
}

// ---------- Result View ----------
function showResult(r){
  document.getElementById('examView').classList.add('hidden');
  const rv = document.getElementById('resultView');
  rv.classList.remove('hidden');
  const letters=['A','B','C','D'];
  let reviewHtml = QUESTIONS.map((q,i)=>{
    const sel = r.answers[i];
    const opts = q.options.map((o,oi)=>{
      let cls='';
      if(oi===q.answer) cls='correct';
      else if(oi===sel && sel!==q.answer) cls='wrong';
      return `<div class="rev-opt ${cls}">${letters[oi]}. ${o} ${oi===q.answer?'<i class="fas fa-check" style="color:#16a34a;"></i>':''} ${oi===sel?'<span style="font-size:0.7rem;color:#64748b;">(your answer)</span>':''}</div>`;
    }).join('');
    const tag = sel===null?'<span style="color:#64748b;">Skipped</span>':(sel===q.answer?'<span style="color:#16a34a;">Correct</span>':'<span style="color:#ef4444;">Incorrect</span>');
    return `<div class="rev-q"><div class="rq-head"><span>Q${i+1} &middot; ${q.secName}</span><span>${tag}</span></div>
      <div style="font-weight:600; margin-bottom:8px;">${q.text}</div>${opts}<div class="sol"><b>Solution:</b> ${q.solution}</div></div>`;
  }).join('');

  const secRows = r.secStats.map(s=>`<tr><td>${s.name}</td><td>${s.total}</td><td style="color:#16a34a;">${s.correct}</td><td style="color:#ef4444;">${s.wrong}</td><td>${s.unatt}</td><td><b>${s.score.toFixed(2)}</b></td></tr>`).join('');

  rv.innerHTML = `
    <div class="res-hero">
      <div style="font-size:0.8rem; font-weight:700; color:#64748b;">${QUIZ_ID}${r.section?' &middot; '+r.section:''}</div>
      <div class="res-score">${r.score.toFixed(2)} <span style="font-size:1.2rem; color:#64748b;">/ ${r.total}</span></div>
      <div style="font-weight:700; color:#16a34a;">Test Submitted Successfully</div>
    </div>
    <div class="res-stats">
      <div class="stat"><div class="v" style="color:#16a34a;">${r.correct}</div><div class="l">Correct</div></div>
      <div class="stat"><div class="v" style="color:#ef4444;">${r.wrong}</div><div class="l">Incorrect</div></div>
      <div class="stat"><div class="v" style="color:#64748b;">${r.unatt}</div><div class="l">Unattempted</div></div>
      <div class="stat"><div class="v" style="color:#2563eb;">${r.accuracy}%</div><div class="l">Accuracy</div></div>
    </div>
    <h3 style="font-size:1rem; font-weight:800;">Section-wise Analysis</h3>
    <table class="sec-table"><thead><tr><th>Section</th><th>Total</th><th>Correct</th><th>Wrong</th><th>Skipped</th><th>Score</th></tr></thead><tbody>${secRows}</tbody></table>
    <div class="res-actions">
      <button class="btn btn-submit" onclick="reattemptTest()"><i class="fas fa-redo"></i> Reattempt</button>
      <a class="btn btn-save-ghost" href="cgl/" style="text-decoration:none;"><i class="fas fa-list"></i> Back to Tests</a>
    </div>
    <h3 style="font-size:1rem; font-weight:800;">Solutions</h3>
    ${reviewHtml}
  `;
  window.scrollTo(0,0);
}

function reattemptTest(){
  localStorage.removeItem(RESULT_KEY);
  location.href = location.pathname + '?id=' + encodeURIComponent(QUIZ_ID) + (SECTION_PARAM?'&section='+encodeURIComponent(SECTION_PARAM):'') + '&mode=reattempt';
}

// ---------- Boot ----------
function boot(){
  setupStructure();
  buildAll();
  initState();
  document.getElementById('examName').innerText = QUIZ_ID + (SECTION_PARAM? ' · '+SECTION_PARAM : '');

  // If already submitted and not reattempt -> show analysis directly
  const existing = MODE!=='reattempt' ? localStorage.getItem(RESULT_KEY) : null;
  if(existing){
    try{ showResult(JSON.parse(existing)); return; }catch(e){}
  }
  if(MODE==='reattempt') localStorage.removeItem(RESULT_KEY);

  renderSectionTabs();
  renderQuestion();
  startTimer();
}
boot();
</script>
