<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0b1020" />
  <title>Mock Test | Study Planner Mock</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <!-- Test header -->
  <header class="test-topbar">
    <div class="container inner">
      <div class="test-title" id="testName">Loading…<small id="testMeta"></small></div>
      <div style="display:flex;align-items:center;gap:12px;">
        <div class="timer" id="timer">--:--</div>
        <button class="btn sm" id="submitBtn">Submit Test</button>
      </div>
    </div>
  </header>

  <!-- Test view -->
  <main class="container" id="testView">
    <div class="test-layout">
      <!-- question panel -->
      <section class="q-panel">
        <div class="q-head">
          <span>Question <span id="qNum">1</span> of <span id="qTotal">0</span></span>
          <span class="q-sub" id="qSubject">—</span>
        </div>
        <div class="q-text" id="qText"></div>
        <div class="options" id="options"></div>
        <div class="q-actions">
          <button class="btn ghost sm" id="clearBtn">Clear Response</button>
          <button class="btn ghost sm" id="reviewBtn">Mark for Review</button>
          <span class="spacer"></span>
          <button class="btn ghost sm" id="prevBtn">← Previous</button>
          <button class="btn sm" id="nextBtn">Save &amp; Next →</button>
        </div>
      </section>

      <!-- palette -->
      <aside class="palette">
        <h4>Question Palette</h4>
        <div class="legend">
          <span><i style="background:var(--ok)"></i>Answered</span>
          <span><i style="background:var(--brand-2)"></i>Marked</span>
          <span><i style="background:var(--bg-soft);border:1px solid var(--border)"></i>Not answered</span>
          <span><i style="background:var(--bg-soft);opacity:.6"></i>Not visited</span>
        </div>
        <div class="pal-grid" id="palette"></div>
        <button class="btn" id="submitBtn2" style="width:100%">Submit Test</button>
      </aside>
    </div>
  </main>

  <!-- Results view -->
  <main class="container result-wrap" id="resultView" style="display:none;">
    <div class="score-card">
      <div style="color:var(--muted);font-weight:700;">YOUR SCORE</div>
      <div class="score-ring"><span id="rScore">0</span> / <span id="rMax">0</span></div>
      <div style="color:var(--muted);margin-top:6px;" id="rTitle"></div>
    </div>
    <div class="result-stats">
      <div class="stat"><div class="num" id="rCorrect" style="color:var(--ok);-webkit-text-fill-color:var(--ok)">0</div><div class="lbl">Correct</div></div>
      <div class="stat"><div class="num" id="rWrong" style="color:var(--danger);-webkit-text-fill-color:var(--danger)">0</div><div class="lbl">Wrong</div></div>
      <div class="stat"><div class="num" id="rSkip">0</div><div class="lbl">Skipped</div></div>
      <div class="stat"><div class="num" id="rAcc">0%</div><div class="lbl">Accuracy</div></div>
    </div>

    <div class="section-head"><h2 style="font-size:22px;">Section-wise performance</h2></div>
    <table class="sec-table" id="secTable">
      <thead><tr><th>Section</th><th>Attempted</th><th>Correct</th><th>Wrong</th><th>Score</th></tr></thead>
      <tbody></tbody>
    </table>

    <div class="q-actions" style="margin:26px 0;">
      <button class="btn" id="reviewSolBtn">Review Solutions</button>
      <a class="btn ghost" href="exams/cgl/index.html">Back to Tests</a>
    </div>

    <div id="solutionsWrap" style="display:none;"></div>
  </main>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/apiClient.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/test.js"></script>
</body>
</html>
