# One-click deploy to Render (https://render.com).
# In Render: New +  ->  Blueprint  ->  connect this repo.
# This provisions BOTH a web service and a Postgres database together,
# so your data (users, attempts, admin changes) persists permanently.

databases:
  - name: studyplanner-db
    plan: free
    databaseName: studyplanner
    user: studyplanner

services:
  - type: web
    name: studyplannermock
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL              # auto-filled from the database above
        fromDatabase:
          name: studyplanner-db
          property: connectionString
      - key: JWT_SECRET                # Render generates a strong secret
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@studyplanner.mock
      - key: ADMIN_PASSWORD            # Render prompts you to enter this on deploy
        sync: false
      - key: NODE_VERSION
        value: "22"
