<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0b1020" />
  <title>Sign in | Study Planner Mock</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="container inner">
      <a href="index.html" class="brand">
        <span class="logo">S</span>
        <span>STUDY PLANNER MOCK<small>SMART MOCK TESTS</small></span>
      </a>
      <nav class="nav"><a href="index.html">Home</a></nav>
    </div>
  </header>

  <main class="auth-wrap">
    <div class="auth-card">
      <h1>Welcome back</h1>
      <p class="sub">Sign in to take tests and track your progress.</p>

      <div class="alert error" id="alert"></div>

      <form id="loginForm">
        <div class="field">
          <label for="email">Email</label>
          <input class="input" type="email" id="email" required autocomplete="email" placeholder="you@example.com" />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input class="input" type="password" id="password" required autocomplete="current-password" placeholder="••••••••" />
        </div>
        <button class="btn block" type="submit" id="submitBtn">Sign in</button>
      </form>

      <p class="auth-foot">New here? <a href="signup.html">Create an account</a></p>
      <p class="auth-foot" style="font-size:12px;opacity:.8;">Demo logins — Student: <b>student@studyplanner.mock</b> / test1234 · Admin: <b>admin@studyplanner.mock</b> / admin123</p>
    </div>
  </main>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/apiClient.js"></script>
  <script src="assets/js/auth.js"></script>
  <script>
    (function () {
      const alertEl = document.getElementById("alert");
      const params = new URLSearchParams(location.search);
      const next = params.get("next") || "index.html";

      function showError(msg) { alertEl.textContent = msg; alertEl.className = "alert error show"; }

      document.getElementById("loginForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const btn = document.getElementById("submitBtn");
        btn.disabled = true; btn.textContent = "Signing in…";
        try {
          await window.MMH_AUTH.signIn(
            document.getElementById("email").value.trim(),
            document.getElementById("password").value
          );
          location.href = next;
        } catch (err) {
          showError(err.message || "Sign in failed.");
          btn.disabled = false; btn.textContent = "Sign in";
        }
      });
    })();
  </script>
</body>
</html>
